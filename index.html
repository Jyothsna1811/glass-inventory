<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Inventory Management</title>

    <link rel="stylesheet" href="styles.css">

    <!-- PWA Meta -->
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Mobile glass inventory management system">

    <!-- Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" href="icons/icon-192.png">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div class="container">
        <header>
            <h1>🔮 Glass Inventory</h1>
        </header>

        <main>
            <div class="button-grid">
                <button class="action-btn" id="addBtn">➕ Add</button>
                <button class="action-btn" id="removeBtn">➖ Remove</button>
                <button class="action-btn" id="addVariantBtn">🆕 Add Variant</button>
                <button class="action-btn" id="listBtn">📋 Overall List</button>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- ✅ Service Worker Registration -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("SW Registered"))
            .catch(err => console.log("SW Error:", err));
        });
    }
    </script>

</body>
</html>
